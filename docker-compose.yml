name: slopsmith-plus

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slopsmith
      POSTGRES_PASSWORD: slopsmith
      POSTGRES_DB: slopsmith
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slopsmith"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: slopsmith
      MINIO_ROOT_PASSWORD: slopsmith123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8085:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ${DLC_PATH:-~/.local/share/Steam/steamapps/common/Rocksmith2014/dlc}:/dlc
      - rocksmith-config:/config
      # Bundled plugins and static assets.
      # In dev these are live-mounted so edits are picked up on server restart.
      # For a production image build, comment these three lines out — the assets
      # are baked in via `COPY plugins/` and `COPY static/` in the Dockerfile.
      - ./plugins:/app/plugins
      - ./static:/app/static
      - ./VERSION:/app/VERSION
      # User-installed plugins: drop a plugin folder here and restart the server.
      # This volume persists across image upgrades, so user plugins are never lost.
      - user-plugins:/app/user-plugins
    environment:
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://slopsmith:slopsmith@db:5432/slopsmith
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=slopsmith
      - MINIO_SECRET_KEY=slopsmith123
      - MINIO_BUCKET=slopsmith
      - MINIO_USE_SSL=false
      # User plugin directory — plugins placed here are loaded alongside bundled ones.
      - SLOPSMITH_PLUGINS_DIR=/app/user-plugins
      # Logging (optional — image defaults: LOG_LEVEL=info, LOG_PRETTY=true)
      # - LOG_LEVEL=debug

  frontend:
    build: ./frontend
    ports:
      - "8006:80"
    depends_on:
      - web

volumes:
  postgres-data:
  minio-data:
  rocksmith-config:
  user-plugins:


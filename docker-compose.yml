services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Mount your Rocksmith DLC folder (adjust path for your system)
      - ${DLC_PATH:-~/.local/share/Steam/steamapps/common/Rocksmith2014/dlc}:/dlc
      # Persistent config, cache, database
      - rocksmith-config:/config
      # Live-reload source mounts for development
      - ./plugins:/app/plugins
      - ./static:/app/static
      - ./VERSION:/app/VERSION
    environment:
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - DATABASE_URL=file:/config/web_library.db
      - RSCLI_PATH=/opt/rscli/RsCli
      - VGMSTREAM_CLI=/usr/local/bin/vgmstream-cli
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      # Logging (optional)
      # - LOG_LEVEL=debug       # trace | debug | info | warn | error  (default: info)
      # - LOG_PRETTY=true       # human-readable pino output  (default: true)
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./frontend
    ports:
      - "8001:80"
    depends_on:
      - web

volumes:
  rocksmith-config:


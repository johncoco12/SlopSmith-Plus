name: slopsmith-plus

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slopsmith
      POSTGRES_PASSWORD: slopsmith
      POSTGRES_DB: slopsmith
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8085:8080"
    depends_on:
      - db
    volumes:
      - ${DLC_PATH:-~/.local/share/Steam/steamapps/common/Rocksmith2014/dlc}:/dlc
      - rocksmith-config:/config
      # Dev: comment these out for production (assets are baked into the image)
      - ./plugins:/app/plugins
      - ./static:/app/static
      - ./VERSION:/app/VERSION
    environment:
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - DATABASE_URL=postgresql://slopsmith:slopsmith@db:5432/slopsmith
      # Logging (optional — image defaults: LOG_LEVEL=info, LOG_PRETTY=true)
      # - LOG_LEVEL=debug
      # - LOG_PRETTY=false
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./frontend
    ports:
      - "8006:80"
    depends_on:
      - web

volumes:
  postgres-data:
  rocksmith-config:


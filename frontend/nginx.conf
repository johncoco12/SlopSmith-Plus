server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy static assets from the backend
    location /static/ {
        proxy_pass         http://host.containers.internal:8085/static/;
        proxy_set_header   Host              $host;
    }

    # Proxy REST API to the backend
    location /api/ {
        proxy_pass         http://host.containers.internal:8085/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    # Proxy audio files
    location /audio/ {
        proxy_pass         http://host.containers.internal:8085/audio/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass         http://host.containers.internal:8085/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }
}
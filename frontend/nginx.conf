server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (hash routing doesn't strictly need this, but keeps
    # direct-URL loads working if the hash ever changes to history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy static assets (highway.js etc.) from the backend container
    location /static/ {
        proxy_pass         http://web:8080/static/;
        proxy_set_header   Host              $host;
    }

    # Proxy REST API to the backend container
    location /api/ {
        proxy_pass         http://web:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    # Proxy audio files (WEM→OGG converted tracks, sloppak stems)
    location /audio/ {
        proxy_pass             http://web:8080/audio/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout     300s;
        proxy_buffering        off;
    }

    # Proxy WebSocket (note highway stream)
    location /ws/ {
        proxy_pass             http://web:8080/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "Upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }
}

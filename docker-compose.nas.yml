name: slopsmith-plus

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: slopsmith
      POSTGRES_PASSWORD: slopsmith
      POSTGRES_DB: slopsmith
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: slopsmith
      MINIO_ROOT_PASSWORD: slopsmith123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8085:8080"
    depends_on:
      - db
      - minio
    volumes:
      # CDLC library folder on NAS
      - /volume1/piracy/cdlc:/dlc
      # Persistent config, cache
      - slopsmith-config:/config
    environment:
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - DATABASE_URL=postgresql://slopsmith:slopsmith@db:5432/slopsmith
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=slopsmith
      - MINIO_SECRET_KEY=slopsmith123
      - MINIO_BUCKET=slopsmith
      - MINIO_USE_SSL=false
      # Logging (optional — image defaults: LOG_LEVEL=info, LOG_PRETTY=true)
      # - LOG_LEVEL=info
      # - LOG_PRETTY=false
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8006:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  slopsmith-config:
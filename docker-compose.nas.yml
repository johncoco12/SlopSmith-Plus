services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # CDLC library folder on NAS
      - /volume1/piracy/cdlc:/dlc
      # Persistent config, cache, database
      - slopsmith-config:/config
    environment:
      - DLC_DIR=/dlc
      - CONFIG_DIR=/config
      - DATABASE_URL=file:/config/web_library.db
      - RSCLI_PATH=/opt/rscli/RsCli
      - VGMSTREAM_CLI=/usr/local/bin/vgmstream-cli
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      # Logging (optional)
      # - LOG_LEVEL=info        # trace | debug | info | warn | error  (default: info)
      # - LOG_FORMAT=json       # set LOG_PRETTY= to disable pretty-print
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8001:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  slopsmith-config:
